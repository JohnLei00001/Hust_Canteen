{% extends "base.html" %}
{% block title %}搜索 - hust哈食堂{% endblock %}
{% block content %}
<div class="search-page">
  <!-- 独立搜索框 -->
  <div class="standalone-search">
    <form id="search-form" class="search-form">
      <input type="text" id="search-input" placeholder="输入食堂 / 窗口 / 菜品关键词…" required>
      <button type="submit" class="search-btn">搜索</button>
    </form>
  </div>

  <!-- 筛选器 -->
  <div class="filter-bar">
    <label>类型：
      <select id="filter-type">
        <option value="all">全部</option>
        <option value="canteen">食堂</option>
        <option value="stall">窗口</option>
        <option value="dish">菜品</option>
      </select>
    </label>
    <label>排序：
      <select id="filter-sort">
        <option value="default">默认</option>
        <option value="rating">评分↑</option>
        <option value="price">价格↓</option>
      </select>
    </label>
  </div>

  <!-- 结果区 -->
  <div id="results" class="ranking-list"></div>
  <div id="load-more" class="load-more hidden">
    <button onclick="loadMore()">加载更多</button>
  </div>
</div>

<!-- 弹窗骨架（与详情页共用） -->
<div id="detail-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close-modal" data-close>&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<!-- 评价弹窗骨架（放在 </body> 前即可） -->
<div id="rating-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close-modal" data-close>&times;</span>
    <div id="rating-modal-body"></div>
  </div>
</div>

<!-- 拥挤度反馈弹窗 -->
<div id="crowd-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close-modal" data-close>&times;</span>
    <div id="crowd-modal-body"></div>
  </div>
</div>

<style>
.search-page { max-width: 800px; margin: 30px auto; padding: 0 15px; }
.search-bar { display:flex; gap:10px; margin-bottom:20px; }
.search-bar input { flex:1; font-size:18px; padding:12px 15px; }
.filter-bar { margin-bottom:15px; display:flex; gap:15px; align-items:center; }
.load-more { text-align:center; margin:30px 0; }

/* 与现有风格一致的加载更多按钮 */
#load-more button {
  background-color: var(--accent-color);
  color: white;
  border: none;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 2px 4px var(--shadow-color);
}

#load-more button:hover {
  background-color: #F4511E;
  transform: translateY(-2px);
  box-shadow: 0 4px 8px var(--shadow-color);
}

#load-more button:active {
  transform: translateY(0);
  box-shadow: 0 1px 3px var(--shadow-color);
}
</style>

<!-- 必须的两条全局脚本 -->
<script>
  // 传递当前用户ID给JavaScript
  var sessionUserId = '{{ session.get("user_id", "") }}';
  const sessionIsGuest = {{ 'true' if session.get('is_guest') else 'false' }};
</script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
