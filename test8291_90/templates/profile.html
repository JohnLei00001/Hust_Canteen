{% extends "base.html" %}
{% block title %}hust哈食堂 - 个人中心{% endblock %}

{% block content %}
<div class="profile-container">
    <h2 class="profile-title">个人中心</h2>
    
    <form method="POST" action="{{ url_for('update_profile') }}" class="profile-form">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" value="{{ session['username'] }}" required>
        </div>
        
        <div class="form-group">
            <label for="current_password">当前密码（修改信息需要验证）</label>
            <input type="password" id="current_password" name="current_password" required>
        </div>
        
        <div class="form-group">
            <label for="new_password">新密码（留空则不修改）</label>
            <input type="password" id="new_password" name="new_password">
            <small>至少6个字符</small>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" name="confirm_password">
        </div>
        
        <div class="profile-actions">
            <button type="submit" class="btn">保存更改</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>
{% endblock %}
